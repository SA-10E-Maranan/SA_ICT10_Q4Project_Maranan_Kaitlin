<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10E Attendance Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <!-- Google Fonts-->
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <py-config>
        packages = ["numpy", "matplotlib"]
    </py-config>

    <!-- Custom Colors -->
    <style>
        body {
            background-image: url('bg.gif');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
        }

        .card-custom {
            background-color: rgba(224, 219, 228, 0.144); 
            border-radius: 20px;
            font-family: Raleway;
            color: white;
            
        }
        .btn-custom {
            background-color: #2c2363;
            color: white;
        }
        .btn-custom:hover {
            background-color: #3f3388;
        }
        .title-text {
            color: rgb(224, 219, 228); 
            font-weight: bold;
            font-family: Pixelify Sans;
        }

        #output {
            color: white;
            border-radius: 10px;
        } 

        .navbar-brand,.nav-link {
            color: rgb(255, 255, 255) !important;
        }

        .navbar-brand {
            font-family: "Pixelify Sans";
            font-weight: bolder;
            letter-spacing: 0.5px;
            font-size: clamp(1rem, 2.5vw, 1.6rem);
            font-size: 20px;
        }

        .navbar-nav {
            gap: 10px;
        }

        .nav-link {
            font-family: Raleway;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            position: relative;
            width: 135px;
        }

        .nav-link:hover {
            color: white !important;
        }

        .nav-link::after {
            content: "";
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: white;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 30%;
        }    
</style>
</head>
<body>
<nav class="navbar navbar-expand-lg" style="background-color:rgb(18, 18, 53); ">
  <div class="container-fluid px-4">
    <div class="d-flex align-items-center flex-nowrap w-100">
      <a class="navbar-brand me-auto" href="index.html">
        10-Emerald ⟡
      </a>
      <br>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
    <div class="collapse navbar-collapse" id="navbarNav" style="margin-left: 20px;">
      <ul class="navbar-nav ms-auto" style="margin-right: -25px;">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Classmates</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="attendance.html">Attendance</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="gallery.html">Gallery</a>
        </li>
      </ul>
    </div>
</div>
</nav>
   <div class="container-fluid px-4 mt-5 d-flex justify-content-center">

    <!-- MAIN CARD -->
    <div class="card card-custom shadow-lg p-4 w-100"
         style="max-width: 900px;">

        <h3 class="text-center title-text mb-4" style=><i>
            ⊹ ࣪ ˖ Attendance Tracker .ᐟ.ᐟ
        </i></h3>

        <!-- FORM -->
        <form>
            <div class="mb-3">
                <label class="form-label fw-bold" style="font-family: Pixelify Sans; color: rgb(224, 219, 228); font-size: 19px;">
                    Select Day
                </label>

                <select id="dayOfTheWeek" class="form-select">
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold" style="font-family: Pixelify Sans; color: rgb(224, 219, 228); font-size: 19px;">
                    Absences
                </label>

                <input type="number"
                       id="absences"
                       class="form-control"
                       placeholder="Enter number of absences">
            </div>

            <div class="d-grid">
                <input type="button"
                       py-click="displaying"
                       value="Submit"
                       class="btn btn-custom">
            </div>
        </form>

        <!-- OUTPUT INSIDE CARD -->
       <div id="output" class="rounded bg-white p-3 mt-4 d-flex justify-content-center align-items-center overflow-auto" style="min-height: 350px;">
       </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="main2.py"></script>
</body>
</html>
