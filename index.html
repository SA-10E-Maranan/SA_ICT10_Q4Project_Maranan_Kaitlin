<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10E Classmates System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url('bg.gif');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            background-attachment: fixed;
        }

        #content {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #app-wrapper {
            width: 600px;
            max-width: 90%;
            margin: 0 auto;
        }

        .container {
            max-width: 600px;
            width: 100%;
            margin-top: 40px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(128, 0, 0, 0.1);
            background-color: rgba(91, 87, 104, 0.233);
            text-align: center; /* optional but cleaner */
        }

        h1 {
            margin-bottom: 30px;
            font-weight: bold;
        }

        .form-control {
            margin-bottom: 15px;
        }

        .btn-primary {
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            font-weight: bold;
        }

        #classmatelist {
            max-width: 600px;
            width: 100%;
            margin-top: 20px;
        }

        #classmates {
            font-size: 1.2rem;
            padding: 15px;
            background-color: rgb(194, 194, 252);
            border-radius: 5px;
            text-align: center;
        }

        #output {
            text-align: left;
            padding: 15px;
            background-color: rgb(221, 218, 250);
            color: rgb(24, 24, 63);
            border-radius: 5px;
            margin-top: 10px;
            font-size: 18px;
        }

        #message {
            font-size: 15px;
            color: white;
            font-family: Raleway;
            margin-top: 10px;
            text-align: center;
        }

        #desc {
            font-size: 15px;
            color: rgb(224, 219, 228);
            font-family: Raleway;
            margin-top: -15px;
            margin-bottom: 25px;
            text-align: center;
        }

          .navbar-brand,.nav-link {
        color: rgb(255, 255, 255) !important;
        
    }

    .navbar-brand {
        font-family: "Pixelify Sans";
        font-weight: bolder;
        letter-spacing: 0.5px;
        font-size: clamp(1rem, 2.5vw, 1.6rem);
        font-size: 20px;
    }

    .navbar-nav {
        gap: 10px;
    }

    .nav-link {
        font-family: Raleway;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 1px;
        position: relative;
        width: 135px;
    }

    .nav-link:hover {
        color: white !important;
    }

    .nav-link::after {
        content: "";
        position: absolute;
        width: 0;
        height: 2px;
        bottom: -4px;
        left: 0;
        background-color: white;
        transition: width 0.3s ease;
    }

    .nav-link:hover::after {
        width: 30%;
    }
    </style>
</head>
<body class="vh-100 justify-content-center align-items-center">
<nav class="navbar navbar-expand-lg" style="background-color:rgb(18, 18, 53); ">
  <div class="container-fluid px-4">
    <div class="d-flex align-items-center flex-nowrap w-100">
      <a class="navbar-brand me-auto" href="index.html">
        10-Emerald ⟡
      </a>
      <br>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
    </div>
    <div class="collapse navbar-collapse" id="navbarNav" style="margin-left: 20px;">
      <ul class="navbar-nav ms-auto" style="margin-right: -25px;">
        <li class="nav-item">
          <a class="nav-link" href="index.html">Classmates</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="attendance.html">Attendance</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="gallery.html">Gallery</a>
        </li>
      </ul>
    </div>
</div>
</nav>
<div id="content">
    <div id="app-wrapper">
    <div class="container">
        <h1 style="font-family: Pixelify Sans; color: rgb(206, 206, 243);"><i>Grade 10 Classmates System ⋆˚࿔</i></h1>
        <p id="desc"><i>To view and add your classmates easily</i></p>
        
        <div class="mb-3">
            <div class="input-group">
                <input type="text" class="form-control" id="name" placeholder="Name" style="font-family: Raleway;">
            </div><br>
            
            <div class="input-group">
                <input type="text" class="form-control" id="section" placeholder="Section" style="font-family: Raleway;">
            </div><br>

            <div class="input-group">
                <input type="text" class="form-control" id="favsubject" placeholder="Favorite Subject" style="font-family: Raleway;">
            </div>
        </div>
        
        <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit" py-click="addClassmate" style="font-family: Raleway; font-weight: lighter; background-color:rgb(192, 148, 209); color: rgb(24, 24, 63); font-family: Pixelify Sans;">Add a Classmate</button>
        <button class="btn btn-primary" type="submit" py-click="showList" style="font-family: Raleway; font-weight: lighter; background-color:rgb(125, 189, 241); color: rgb(24, 24, 63); font-family: Pixelify Sans;">Show List</button>
        </div>

        </div>
            <div id="message" class="mt-2 small" style="margin-left: 40px; font-size: 15px; color: white; font-family: Raleway;"></div>
        </div>

        <div id="classmatelist">
        <div id="classmates" style="font-family: Pixelify Sans; font-size: 20px; font-weight: lighter;">     
      ₊˚⊹ Classmates List ᰔ</div>
        <pre id="output" style="font-family: Raleway; background-color: rgba(221, 218, 250, 0.74); color:rgb(24, 24, 63); margin-top: -10px; font-size: 18px;"><br></pre>
        </div>
        </div>
        </div>
    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
